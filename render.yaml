services:
  - type: web
    name: clutchd-app
    runtime: node
    region: singapore
    plan: free
    buildCommand: NODE_OPTIONS="--max-old-space-size=2048" npm ci && NODE_OPTIONS="--max-old-space-size=2048" npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://clutchd-api.onrender.com/api
      - key: NEXT_PUBLIC_WS_URL
        value: wss://clutchd-api.onrender.com/ws
      - key: NODE_OPTIONS
        value: --max-old-space-size=2048
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
