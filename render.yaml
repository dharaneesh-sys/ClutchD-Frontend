services:
  - type: web
    name: clutchd-app
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://clutchd-api.onrender.com/api
      - key: NEXT_PUBLIC_WS_URL
        value: wss://clutchd-api.onrender.com/ws
