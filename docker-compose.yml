services:
  db:
    image: postgis/postgis:16-3.4
    env_file: .env.docker
    environment:
      POSTGRES_USER: mechoncall
      POSTGRES_PASSWORD: mechoncall
      POSTGRES_DB: mechoncall
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mechoncall -d mechoncall"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 45s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/backend/uploads:/app/uploads

  worker:
    build:
      context: ./backend/backend
      dockerfile: Dockerfile.worker
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/backend/uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    env_file: .env.docker
    depends_on:
      - api

volumes:
  pgdata:
